    <main>
        <section>
            <h2>Contacta amb mi</h2>
            <p>Si vols parlar amb mi o comentar algun projecte, pots enviar-me un missatge:</p>

            <form class="formulari-contacte">
                <div class="camp">
                    <label for="nom">Nom:</label>
                    <input type="text" id="nom" required>
                </div>

                <div class="camp">
                    <label for="email">Correu electrònic:</label>
                    <input type="email" id="email" required>
                </div>

                <div class="camp">
                    <label for="missatge">Missatge:</label>
                    <textarea id="missatge" rows="5" required></textarea>
                </div>

                <div class="camp">
                    <label><input type="checkbox" required> Accepto la política de privacitat</label>
                </div>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
